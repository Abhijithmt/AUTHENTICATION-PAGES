<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>

</head>
<body>
    <section class="h-screen flex items-center justify-center p-6 bg-white ">
        <div  class="max-w-md  border-white w-full rounded-2xl p-8 shadow-2xl">
            <div class="text-center flex flex-col gap-10">
                <h1 class="text-center text-3xl  sm:text-4xl md:text-5xl font-bold">Find Your account</h1>
                <p class="text-center font-extrabold text-gray-500">Enter your email to reset your password.</p>
            </div>

            <div>
                <form class="mt-7  gap-5 flex flex-col">
                    <div class="gap-3 flex flex-col">
                        <label class="font-bold">Email address</label>
                    <input  class =" border w-full px-8 py-4 rounded-md"
                    type="email"
                    placeholder="Email">
                    </div>

                    <div class="">
                     <button class="border bg-gray-500 hover:bg-gray-700 w-full py-4 rounded-md font-bold">Submit</button>
                    </div>
                </form>
            </div>
             
        </div>
    </section>
    
</body>
</html>
