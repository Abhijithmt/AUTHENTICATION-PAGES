<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <section class="h-screen flex items-center justify-center p-6 bg-white ">
        <div class="max-w-md  border-white w-full rounded-2xl p-8 shadow-2xl ">
            <div class=" flex flex-col justify-center gap-5 ">
                <h1 class="text-center text-3xl  sm:text-4xl md:text-5xl font-extrabold">Login</h1>
                <p class="text-gray-500 mt-5 mb-5 text-center">Please enter your details to login</p>
            </div>
            <form class="  flex flex-col ">
                <div>
                    <label class="text-md  font-bold mb-8">Email</label>
                    <input class="border mt-1 border-gray-300 rounded-xl px-4 py-3 w-full text-black font-bold"
                     type="email"
                    placeholder="Enter your email address">
                </input>

                </div>
                <div>
                    <label class="text-md  font-bold ">Password</label>
                    <input class="border mt-1 border-gray-300 rounded-xl font-bold px-4 py-3 w-full text-black"
                     type="password"
                    placeholder="Enter your password">
                </input>
            </div>
                <div class="mt-2 text-left">
                    <a href="forget-password.html" class="text-blue-500 hover:underline cursor-pointer">forget password</a>
                </div>

                <div class="mt-4">
                    <button class="bg-gray-600 font-bold  hover:bg-gray-700 text-white w-full py-4 rounded-md">Login</button>
                </div>
                
            </form>
            <div class="flex mt-2.5 justify-center gap-1">
                <p class="text-black">Don't have an account?</p>
                <a class="text-blue-500 hover:underline cursor-pointer">sign up</a>
            </div>
        </div>
    </section>
    

    
</body>
</html>
